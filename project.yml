name: VoiceTodo
options:
  bundleIdPrefix: com.voicetodo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  developmentLanguage: zh-Hans
  knownRegions:
    - Base
    - zh-Hans
    - en
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5"
    PRODUCT_NAME: "$(TARGET_NAME)"
    ENABLE_TESTABILITY: YES
    DEVELOPMENT_LANGUAGE: zh-Hans
    SWIFT_EMIT_LOC_STRINGS: YES
  debug:
    SWIFT_OPTIMIZATION_LEVEL: -Onone
  release:
    SWIFT_OPTIMIZATION_LEVEL: -O

targets:
  # 主应用
  VoiceTodo:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "**/.DS_Store"
      - path: Voice
        excludes:
          - "**/.DS_Store"
      - path: Extractor
        excludes:
          - "**/.DS_Store"
      - path: Store
        excludes:
          - "**/.DS_Store"
      - path: UI/ConfirmSheet
        excludes:
          - "**/.DS_Store"
      - path: UI/Home
        excludes:
          - "**/.DS_Store"
      - path: UI/Detail
        excludes:
          - "**/.DS_Store"
      - path: UI/Shared
        excludes:
          - "**/.DS_Store"
      - path: Protocols
        excludes:
          - "**/.DS_Store"
          - "CodingConventions.md"
      - path: VoiceTodo/Assets.xcassets
      - path: VoiceTodo/InfoPlist.xcstrings
      - path: Resources/Localizable.xcstrings
    settings:
      base:
        INFOPLIST_FILE: VoiceTodo/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.voicetodo.app
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: VoiceTodo/VoiceTodo.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.voicetodo.shared
    info:
      path: VoiceTodo/Info.plist
      properties:
        CFBundleDisplayName: VoiceTodo
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleURLTypes:
          - CFBundleURLName: com.voicetodo
            CFBundleURLSchemes:
              - voicetodo
        ITSAppUsesNonExemptEncryption: false
        UIUserInterfaceStyle: Light
        VoiceTodoProxyEndpoint: "$(VOICETODO_AI_PROXY_ENDPOINT)"
        VoiceTodoProxyAppToken: "$(VOICETODO_AI_PROXY_APP_TOKEN)"
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSSpeechRecognitionUsageDescription: "VoiceTodo 需要语音识别权限来理解你的语音指令"
        NSMicrophoneUsageDescription: "VoiceTodo 需要麦克风来录制你的语音"
        NSCalendarsWriteOnlyAccessUsageDescription: "VoiceTodo 需要日历写入权限，以便把确认后的待办同步到系统日历"
        UIBackgroundModes:
          - audio
    dependencies:
      - target: VoiceTodoWidget
        embed: true
    scheme:
      testTargets:
        - VoiceTodoTests
        - VoiceTodoUITests
      gatherCoverageData: true

  # Widget Extension
  VoiceTodoWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: UI/Widget
        excludes:
          - "**/.DS_Store"
      - path: UI/Shared/DesignSystem.swift
      - path: Store/SwiftDataModels.swift
      - path: Store/AppGroupConfig.swift
      - path: Store/AppGroupModelContainerProvider.swift
      - path: Protocols/Models.swift
      - path: Protocols/VoiceTodoError.swift
      - path: Protocols/ErrorMessages.swift
      - path: Protocols/Constants.swift
      - path: App/Intents/ToggleTodoIntent.swift
      - path: Resources/Localizable.xcstrings
      - path: VoiceTodoWidget/InfoPlist.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicetodo.app.widget
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: VoiceTodoWidget/VoiceTodoWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.voicetodo.shared
    info:
      path: VoiceTodoWidget/Info.plist
      properties:
        CFBundleDisplayName: VoiceTodoWidget
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  # 单元测试
  VoiceTodoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VoiceTodoTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: VoiceTodo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicetodo.app.tests
        GENERATE_INFOPLIST_FILE: YES

  # UI 测试
  VoiceTodoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VoiceTodoUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: VoiceTodo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicetodo.app.uitests
        GENERATE_INFOPLIST_FILE: YES
