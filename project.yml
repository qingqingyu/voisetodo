name: VoiceTodo
options:
  bundleIdPrefix: com.qingqingyu
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  developmentLanguage: en
  knownRegions:
    - Base
    - zh-Hans
    - en
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5"
    PRODUCT_NAME: "$(TARGET_NAME)"
    ENABLE_TESTABILITY: YES
    DEVELOPMENT_LANGUAGE: en
    SWIFT_EMIT_LOC_STRINGS: YES
  debug:
    SWIFT_OPTIMIZATION_LEVEL: -Onone
  release:
    SWIFT_OPTIMIZATION_LEVEL: -O

targets:
  # 主应用
  VoiceTodo:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "**/.DS_Store"
      - path: Voice
        excludes:
          - "**/.DS_Store"
      - path: Extractor
        excludes:
          - "**/.DS_Store"
      - path: Store
        excludes:
          - "**/.DS_Store"
      - path: UI/ConfirmSheet
        excludes:
          - "**/.DS_Store"
      - path: UI/Home
        excludes:
          - "**/.DS_Store"
      - path: UI/Detail
        excludes:
          - "**/.DS_Store"
      - path: UI/Paywall
        excludes:
          - "**/.DS_Store"
      - path: UI/Shared
        excludes:
          - "**/.DS_Store"
      - path: UI/Review
        excludes:
          - "**/.DS_Store"
      - path: UI/MockStore.swift
      - path: Protocols
        excludes:
          - "**/.DS_Store"
          - "CodingConventions.md"
      - path: VoiceTodo/Assets.xcassets
      - path: VoiceTodo/InfoPlist.xcstrings
      - path: VoiceTodo/PrivacyInfo.xcprivacy
      - path: VoiceTodo/Products.storekit
      - path: Resources/Localizable.xcstrings
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    settings:
      base:
        INFOPLIST_FILE: VoiceTodo/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.qingqingyu.voicetodo
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: W63YS53777
        CODE_SIGN_IDENTITY: Apple Development
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: VoiceTodo/VoiceTodo.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.voicetodo.shared
    info:
      path: VoiceTodo/Info.plist
      properties:
        CFBundleDisplayName: VoiceTodo
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleURLTypes:
          - CFBundleURLName: com.voicetodo
            CFBundleURLSchemes:
              - voicetodo
        ITSAppUsesNonExemptEncryption: false
        UIUserInterfaceStyle: Light
        VoiceTodoProxyEndpoint: "$(VOICETODO_AI_PROXY_ENDPOINT)"
        VoiceTodoProxyAppToken: "$(VOICETODO_AI_PROXY_APP_TOKEN)"
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSSpeechRecognitionUsageDescription: "VoiceTodo needs speech recognition access to understand your voice commands."
        NSMicrophoneUsageDescription: "VoiceTodo needs microphone access to record your voice."
        NSCalendarsWriteOnlyAccessUsageDescription: "VoiceTodo needs access to add your todos to the system calendar."
        UIBackgroundModes:
          - audio
        BGTaskSchedulerPermittedIdentifiers:
          - com.qingqingyu.voicetodo.telemetry-upload
    dependencies:
      - target: VoiceTodoWidget
        embed: true
    scheme:
      testTargets:
        - VoiceTodoTests
        - VoiceTodoUITests
      gatherCoverageData: true

  # Widget Extension
  VoiceTodoWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: UI/Widget
        excludes:
          - "**/.DS_Store"
      - path: UI/Shared/DesignSystem.swift
      - path: Store/SwiftDataModels.swift
      - path: Store/AppGroupConfig.swift
      - path: Store/AppGroupModelContainerProvider.swift
      - path: Protocols/Models.swift
      - path: Protocols/Domain/CodingUserInfoKey+Recurrence.swift
      - path: Protocols/Domain/ExtractionOutcome.swift
      - path: Protocols/Domain/RecurrenceRule.swift
      - path: Protocols/Domain/TodoDueDateResolver.swift
      - path: Protocols/Domain/RecurrenceRuleResolver.swift
      - path: Protocols/Domain/TodoDueTimeResolver.swift
      - path: Protocols/Domain/TodoTimeDisplayComposer.swift
      - path: Protocols/Domain/TimeBucket.swift
      - path: Protocols/Domain/RecurrenceEnd.swift
      - path: Protocols/Domain/RecurrenceEndResolver.swift
      - path: Protocols/Domain/DayClock.swift
      - path: Protocols/Domain/WidgetTodoFilter.swift
      - path: Protocols/VoiceTodoError.swift
      - path: Protocols/ErrorMessages.swift
      - path: Protocols/Constants.swift
      - path: Protocols/VoiceTodoLog.swift
      - path: Protocols/Telemetry.swift
      - path: Protocols/TelemetryQueue.swift
      - path: App/Intents/ToggleTodoIntent.swift
      - path: Resources/Localizable.xcstrings
      - path: VoiceTodoWidget/InfoPlist.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qingqingyu.voicetodo.widget
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: W63YS53777
        CODE_SIGN_IDENTITY: Apple Development
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: VoiceTodoWidget/VoiceTodoWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.voicetodo.shared
    info:
      path: VoiceTodoWidget/Info.plist
      properties:
        CFBundleDisplayName: VoiceTodoWidget
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  # 单元测试
  VoiceTodoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VoiceTodoTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: VoiceTodo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qingqingyu.voicetodo.tests
        GENERATE_INFOPLIST_FILE: YES

  # UI 测试
  VoiceTodoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VoiceTodoUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: VoiceTodo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qingqingyu.voicetodo.uitests
        GENERATE_INFOPLIST_FILE: YES
